# Default configuration for comenqd

# GitHub Personal Access Token used for authentication.
# Provide either github_token or github_token_file.
# github_token = ""

# Path to a file containing the token. Read at startup; overrides
# github_token. A leading ${VAR} placeholder is expanded from the
# environment, enabling systemd LoadCredential integration:
# github_token_file = "${CREDENTIALS_DIRECTORY}/token"

# Paths to files each containing one token. When non-empty, neither
# github_token nor github_token_file is required, and the daemon posts
# comments with these tokens in round-robin rotation:
# github_token_files = ["/home/user/pandalump-token", "/home/user/buzzybee-token"]

# Minimum log level to output
# log_level = "info"

# Path to the Unix domain socket for client connections
# socket_path = "/run/comenq/comenq.sock"

# Location for the persistent yaque queue data
# queue_path = "/var/lib/comenq/queue"

# Cooldown period between posting comments in seconds
# cooldown_period_seconds = 960

# Maximum random flutter added to each cooldown in seconds. The full
# cooldown always elapses; a fresh random duration up to this value is
# added on top. Zero (the default) disables flutter.
# cooldown_flutter_seconds = 0
