name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Install nextest
        uses: taiki-e/install-action@db22c42b5af88356329b9a8056bb2c2f026d5a10
        with:
          tool: nextest@0.9.114
      - name: Format
        run: make check-fmt
      - name: Cache Whitaker installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker Dylint suite
        env:
          # The prebuilt dylint-link binary aborts its post-install
          # verification when RUSTUP_TOOLCHAIN is unset, and the source
          # fallback needs rustc >= 1.91, which the repository's pinned
          # nightly predates. Run the installer on the runner's stable
          # toolchain to satisfy both paths.
          RUSTUP_TOOLCHAIN: stable
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Set up isolated Rust for Merman
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Install Merman CLI
        run: cargo +1.95.0 install merman-cli --version '=0.7.0' --locked
      - name: Spelling
        run: make spelling
      - name: Validate Mermaid diagrams
        run: make nixie
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test Only
        run: make test
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@f9f1c863c8a5bef64aa6779caa746e1a4a6c1ad4
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@1213d7874aa42ff034587d9385f35178d51e1f65
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
